name: Build Android APK with EAS

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install

      - name: Trigger EAS build and download APK
        run: |
          eas build --platform android --profile production --non-interactive --wait --json > build.json
          url=$(jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl' build.json)
          echo "APK URL: $url"
          curl -L -o podfetch.apk "$url"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/podfetch.apk
