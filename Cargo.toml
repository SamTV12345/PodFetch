[workspace]
members = [".", "crates/common-infrastructure", "crates/podfetch-domain", "crates/podfetch-web", "crates/podfetch-persistence", "crates/podfetch-storage"]
resolver = "2"

[package]
name = "podfetch"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[build-dependencies]
built = {version="0.8.0", features=["chrono", "semver","cargo-lock"]}

[features]
default = ["sqlite", "postgresql"]
postgresql = ["diesel/postgres", "diesel_migrations/postgres", "dep:r2d2_postgres",
    "diesel/postgres_backend", "common-infrastructure/postgresql", "podfetch-persistence/postgresql", "podfetch-web/postgresql",
    "hyper-tls", "native-tls"]
sqlite = ["diesel/sqlite", "diesel_migrations/sqlite", "diesel/returning_clauses_for_sqlite_3_35",
    "common-infrastructure/sqlite", "podfetch-persistence/sqlite", "podfetch-web/sqlite"]

[dependencies]
# Workspace crates
common-infrastructure = { path = "crates/common-infrastructure", default-features = false }
podfetch-domain = { path = "crates/podfetch-domain" }
podfetch-persistence = { path = "crates/podfetch-persistence", default-features = false }
podfetch-storage = { path = "crates/podfetch-storage" }
podfetch-web = { path = "crates/podfetch-web", default-features = false }

# Web framework (startup, routing, UI serving)
axum = { version = "0.8.8", features = ["macros", "http2"] }
utoipa-axum = "0.2.0"
utoipa-swagger-ui = { version = "9.0.2", features = ["axum"] }
utoipa-rapidoc = { version = "6.0.0", features = ["axum"] }
utoipa-redoc = { version = "6.0.0", features = ["axum"] }
utoipa-scalar = { version = "0.3.0", features = ["axum"] }
socketioxide = "0.18.2"
maud = { version = "*", features = ["axum", "axum-core"] }
mime_guess = "2.0.5"

# Database (migrations)
diesel = { version = "2.3.7", features = ["chrono", "r2d2"] }
diesel_migrations = "2.3.1"
r2d2_postgres = { version = "0.18.2", optional = true }

# Async runtime
tokio = { version = "1.50.0", features = ["full"] }

# Scheduler
clokwerk = "0.4.0"

# CLI
rpassword = "7.4.0"
sha256 = "1.6.0"
uuid = { version = "1.22.0", features = ["v4", "serde"] }

# Serialization
serde = "1.0.228"
serde_derive = "1.0.189"
serde_json = "1.0.149"

# Logging
log = "0.4.29"

[target.'cfg(not(windows))'.dependencies]
hyper-tls = { version = "0.6.0", optional = true }
native-tls = { version = "0.2.15", optional = true }

[dev-dependencies]
serial_test = "3.4.0"
testcontainers = { version = "0.24.0" }
testcontainers-modules = { version = "0.12.1", features = ["postgres", "blocking"] }
derive_builder = "0.20.2"
fake = { version = "5.0.0", features = ["chrono", "url"] }
bollard = { version = "*", features = ["rustls", "rustls-native-certs"], default-features = false }
axum-test = "19.1.1"

[profile.release]
debug = true

[profile.release.package."*"]
debug = false
