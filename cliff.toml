# git-cliff configuration ~ https://git-cliff.org/docs/configuration
# Generate the full changelog:   git cliff -o CHANGELOG.md
# Notes for the latest tag only: git cliff --latest --strip header

[changelog]
header = """
# Changelog\n
All notable changes to PodFetch are documented here.\n
"""
# Tera template applied per release. Groups are ordered via the `<!-- N -->`
# prefix on the group name and stripped for display.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false   # keep non-conventional commits (routed to "Other")
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

# Runs on the raw subject BEFORE parsing. Turn "(#123)" into a PR link.
commit_preprocessors = [
    { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/SamTV12345/PodFetch/pull/${1}))" },
]

# First match wins. Dependabot/dep-bump commits are dropped (skip = true).
commit_parsers = [
    { message = "^build\\(deps", skip = true },
    { message = "^chore\\(deps", skip = true },
    { message = "(?i)^bump ", skip = true },
    { message = "^[Mm]erge", skip = true },
    { message = "(?i)^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "(?i)^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "(?i)^perf", group = "<!-- 2 -->⚡ Performance" },
    { message = "(?i)^refactor", group = "<!-- 3 -->🚜 Refactor" },
    { message = "(?i)^doc", group = "<!-- 4 -->📚 Documentation" },
    { message = "(?i)^test", group = "<!-- 5 -->🧪 Testing" },
    { message = "(?i)^style", skip = true },
    { message = "(?i)^chore|^ci|^build", group = "<!-- 6 -->⚙️ Miscellaneous" },
    { message = ".*", group = "<!-- 7 -->📦 Other" },
]
